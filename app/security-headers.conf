# FrugalRoute app — security response headers (split 14 hardening).
#
# `include`d into the server block AND each content location, because nginx's
# add_header inheritance is reset by any location that sets its own add_header
# (the cache-control locations do) — including the snippet everywhere keeps the
# headers on every response.
#
# CSP notes (compatible with the dc-runtime + vendored React):
#   - script-src 'unsafe-eval': the dc-runtime (support.js) evaluates the page's
#     own <script type="text/x-dc"> logic via new Function(). That logic is the
#     static, first-party bundle shipped in the image — never user input — so the
#     residual is bounded; documented in ACCEPTANCE.md.
#   - style-src 'unsafe-inline': the design uses an inline <style> and many inline
#     style="" attributes (React style props); inline style attributes cannot be
#     hashed, so 'unsafe-inline' is required for styling only (not scripts).
#   - fonts.googleapis.com / fonts.gstatic.com: the sole external origin (Google
#     Fonts). Everything else (React, support.js, the API) is same-origin 'self'.
#   - connect-src 'self': /api fetch + the same-origin SSE EventSource stream.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer" always;
add_header X-Frame-Options "DENY" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
