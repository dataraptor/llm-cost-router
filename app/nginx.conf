# FrugalRoute app — nginx server block (split 13).
#
# Serves the static dc-runtime UI at / and reverse-proxies /api/* to the `api`
# service, so the browser talks to one origin (config.js's default "/api" resolves
# same-origin → no CORS in prod). Runs under nginxinc/nginx-unprivileged (uid 101,
# listens on 8080; the main nginx.conf in that image already drops privileges).

server {
    listen 8080;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    # Security response headers (split 14). Re-included in each location below
    # because any location that sets its own add_header resets inherited ones.
    include /etc/nginx/conf.d/security-headers.conf;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Container-internal liveness endpoint for HEALTHCHECK (no upstream needed).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Reverse-proxy the engine. Same-origin → no CORS. Buffering off so the SSE
    # stream (/api/route/stream) flushes events live.
    location /api/ {
        include /etc/nginx/conf.d/security-headers.conf;
        set $api_target http://api:8000;
        proxy_pass $api_target;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # Vendored React + app modules are content-addressed by version → long-cache.
    location /vendor/ { include /etc/nginx/conf.d/security-headers.conf; expires 30d; add_header Cache-Control "public, max-age=2592000, immutable"; }
    location /src/    { include /etc/nginx/conf.d/security-headers.conf; expires 1h;  add_header Cache-Control "public, max-age=3600"; }

    # The dc-runtime re-fetches location.href for its template; the HTML and the
    # runtime must never be cached stale.
    location ~* \.(html)$ { include /etc/nginx/conf.d/security-headers.conf; add_header Cache-Control "no-cache"; }
    location = /support.js { include /etc/nginx/conf.d/security-headers.conf; add_header Cache-Control "no-cache"; }

    location / {
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri $uri/ =404;
    }
}
